name: Hourly USA_RUN Scraper

on:
  schedule:
    # Runs at minute 0 past every hour (e.g., 1:00, 2:00, 3:00 UTC)
    - cron: '0 * * * *'
  workflow_dispatch: 
    # Allows manual triggering from the Actions tab

permissions:
  contents: write # Needed to push the new data back to the repo

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Hardcoding the dependencies as requested, including cryptography for decryption
          pip install requests aiohttp aiohttp_retry tqdm cryptography

      - name: Run Encrypted Scraper
        env:
          # Passes the GitHub Secret into the environment for os.getenv("SUPER_KEY")
          SUPER_KEY: ${{ secrets.SUPER_KEY }}
        run: |
          python USA_RUN.py

      - name: Commit and Push Data Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add the data folder and any updated txt/json files
          git add data/ *.json logs/ zipcodes.txt || true
          
          # Only commit and push if there are new changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update: Movie showtime data [skip ci]"
            git push
          else
            echo "No new data changes to commit."
          fi
