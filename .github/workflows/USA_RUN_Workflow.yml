name: Hourly Combined USA Scrapers

on:
  schedule:
    # Runs at minute 0 past every hour
    - cron: '0 * * * *'
  workflow_dispatch: 
    # Allows manual triggering from the Actions tab

# Prevents multiple scrapers from running at the exact same time and corrupting the git history
concurrency:
  group: usa-scraper-group
  cancel-in-progress: false

permissions:
  contents: write # Needed to push the new data back to the repo

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetches full history so the rebase has the necessary context
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests aiohttp aiohttp_retry tqdm cryptography

      - name: Run First Encrypted Scraper (USA_RUN)
        env:
          SUPER_KEY: ${{ secrets.SUPER_KEY }}
        run: |
          python USA_RUN.py

      - name: Run Second Encrypted Scraper (USA_RUN_UBS)
        env:
          SUPER_KEY: ${{ secrets.SUPER_KEY }}
        run: |
          python USA_RUN_UBS.py

      - name: Commit and Push Data Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add the data folder and any updated txt/json files
          git add data/ *.json zipcodes.txt || true
          
          # Only commit and push if there are actual new changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update: Combined movie showtime data [skip ci]"
            
            # Pull the latest changes from the remote to avoid push rejections
            # Using rebase avoids messy merge commits
            git pull --rebase origin main
            
            # Push the updated data back to the repository
            git push origin main
          else
            echo "No new data changes to commit."
          fi
